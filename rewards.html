<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>100 HUB Games</title>

 <!-- Google Font (Streetwear Clean) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">


<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:#000;color:white;overflow-x:hidden;}

/* VIDEO BACKGROUND */
.video-bg{position:fixed;inset:0;z-index:-2;}
.video-bg video{width:100%;height:100%;object-fit:cover;filter:brightness(0.3);}

/* NAV */
.nav{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;align-items:center;
padding:10px 40px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(12px);
z-index:1000;
}
.logo img{height:70px;}
.nav a{margin-left:25px;color:white;text-decoration:none;}

.play-btn{
background:#e10600;border:none;padding:10px 20px;
border-radius:25px;color:white;cursor:pointer;
}

/* AUTH */
.auth-screen{
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
z-index:1500;
pointer-events:none;
transition:0.4s;
}

.auth-box{
pointer-events:auto;
background:url("assets/logo.png") center/180px no-repeat;

padding:60px;
border-radius:20px;
text-align:center;
width:350px;
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.1);
}

.auth-box input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:#111;
color:white;
}

/* HERO */
.hero{
padding-top:140px;
text-align:center;
}
.hero h1{font-size:60px;font-weight:800;}

/* COMING SOON */
#comingSoon{
display:none;
text-align:center;
padding:120px 20px;
animation:fadeIn 1s ease;
}

#comingSoon input{
padding:14px;
width:260px;
border:none;
border-radius:10px;
background:#111;
color:white;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* MAIN */
#mainContent{
text-align:center;
padding:60px;
}

footer{
padding:60px;
text-align:center;
color:#777;
}
/* ===== WHATSAPP HUB (FIXED + VISIBLE) ===== */

.wa-hub {
  position: fixed;
  bottom: 25px;
  right: 25px;
  z-index: 999999; /* ABOVE EVERYTHING */
  text-decoration: none;
}

/* pill design */
.wa-inner {
  position: relative;
  display: flex;
  align-items: center;
  gap: 10px;

  padding: 14px 18px;
  border-radius: 999px;

  background: rgba(0,0,0,0.6); /* darker for contrast on video */
  backdrop-filter: blur(14px);

  border: 1px solid rgba(255,255,255,0.12);

  color: white;
  font-size: 13px;
  font-weight: 600;

  box-shadow: 0 10px 40px rgba(0,0,0,0.6);

  opacity: 1; /* FORCE VISIBLE */
  transform: none; /* disable animation issues */

  transition: all 0.3s ease;
}

/* icon */
.wa-inner i {
  font-size: 20px;
  color: #d3254b;
}

/* hover */
.wa-inner:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
}

/* glow effect */
.wa-inner::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 999px;
  box-shadow: 0 0 20px rgba(37,211,102,0.5);
  opacity: 0;
  transition: 0.3s;
}

.wa-inner:hover::after {
  opacity: 1;
}

/* mobile */
@media (max-width: 600px) {
  .wa-inner span {
    display: none;
  }

  .wa-inner {
    padding: 14px;
  }
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="video-bg">
<video autoplay muted loop playsinline>
<source src="assets/Background.mp4">
</video>
</div>

<!-- NAV -->
<header class="nav">
<div class="logo"><img src="assets/logo.png"></div>
<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="startproject.html">Services</a>
<button onclick="logout()" class="play-btn" id="navBtn">Login</button>
</nav>
</header>

<!-- AUTH -->
<div id="authScreen" class="auth-screen">
  <div class="auth-box">
    <h2 id="authTitle">Sign In</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Continue</button>

    <p>
      Don’t have an account?
      <span onclick="toggleAuth()" style="color:#e10600;cursor:pointer;">create account</span>
    </p>
  </div>
</div>

<!-- HERO -->
<section class="hero">
<h1>100 HUB</h1>
</section>

<!-- COMING SOON -->
<section id="comingSoon">
<h1>Opening Soon</h1>

<p style="opacity:0.7;margin:20px 0;">
We’re building something powerful.<br>
Leave your email to be first in.
</p>

<input type="email" id="emailInput" placeholder="Enter your email">
<br><br>
<button class="play-btn" onclick="submitEmail()">Notify Me</button>

<p id="emailMsg" style="margin-top:15px;color:#22c55e;"></p>
</section>

<!-- MAIN -->
<div id="mainContent">
<h2>Games Locked 🔒</h2>
<p>You can explore the site or sign in anytime</p>
</div>

<footer>
© 2026 100 Projects Agency
</footer>

<script>

/* ELEMENTS */
const authScreen = document.getElementById("authScreen");
const mainContent = document.getElementById("mainContent");
const comingSoon = document.getElementById("comingSoon");
const username = document.getElementById("username");
const password = document.getElementById("password");
const emailInput = document.getElementById("emailInput");
const emailMsg = document.getElementById("emailMsg");
const authTitle = document.getElementById("authTitle");
const navBtn = document.getElementById("navBtn");

/* STATE */
let isLogin = true;

/* TOGGLE */
function toggleAuth(){
  isLogin = !isLogin;
  authTitle.innerText = isLogin ? "Sign In" : "Sign Up";
}

/* LOGIN / SIGNUP */
function login(){

  let user = username.value.trim();
  let pass = password.value.trim();

  if(!user || !pass) return alert("Enter details");

  let users = JSON.parse(localStorage.getItem("users")) || {};

  if(!isLogin){

    if(users[user]) return alert("User exists");

    users[user] = {password:pass};
    localStorage.setItem("users", JSON.stringify(users));

    alert("Account created!");
    toggleAuth();
    return;
  }

  if(users[user] && users[user].password === pass){

    localStorage.setItem("currentUser", user);

    authScreen.style.display = "none";
    mainContent.style.display = "none";
    comingSoon.style.display = "block";

    navBtn.innerText = "Logout";

  } else {
    alert("Invalid login");
  }
}

/* AUTO LOGIN */
window.onload = function(){
  let currentUser = localStorage.getItem("currentUser");

  if(currentUser){
    authScreen.style.display = "none";
    mainContent.style.display = "none";
    comingSoon.style.display = "block";
    navBtn.innerText = "Logout";
  }
}

/* LOGOUT */
function logout(){

  let currentUser = localStorage.getItem("currentUser");

  if(!currentUser){
    authScreen.style.display = "block";
    return;
  }

  localStorage.removeItem("currentUser");

  authScreen.style.display = "block";
  mainContent.style.display = "block";
  comingSoon.style.display = "none";

  navBtn.innerText = "Login";
}

/* EMAIL */
function submitEmail(){

  let email = emailInput.value.trim();

  if(!email.includes("@")){
    return alert("Enter valid email");
  }

  let list = JSON.parse(localStorage.getItem("waitlist")) || [];

  if(list.includes(email)){
    emailMsg.innerText = "Already on the list 👀";
    return;
  }

  list.push(email);
  localStorage.setItem("waitlist", JSON.stringify(list));

  emailMsg.innerText = "You're on the list 🚀";
}

</script>
<!-- WHATSAPP HUB BUTTON (FINAL PLACEMENT) -->
<a href="https://wa.me/277XXXXXXXXX?text=Hi%20100%20Projects%20Agency%2C%20I%20want%20to%20start%20a%20project"
   class="wa-hub"
   target="_blank">
   <a href="https://www.instagram.com/100projectsmedia/"
   class="wa-hub"
   target="_blank">

  <div class="wa-inner">
    <i class="fab fa-whatsapp"></i>
    <i class="fab fa-instagram"></i>
    <span>Chat with us</span>
  </div>

</a>
</body>
</html>
